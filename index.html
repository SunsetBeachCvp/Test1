<style>
:root {
  --navy:#071528;
  --navy2:#111236;
  --orange:#ff8b00;
  --orange2:#ff4b1f;
  --pink:#df2e83;
  --cream:#ffe8c7;
  --cream2:#fff4e4;
  --white:#fffaf2;
}
* { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior:smooth; }
body {
  margin:0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 8% 0%, rgba(255,139,0,.45), transparent 28%),
    radial-gradient(circle at 100% 6%, rgba(223,46,131,.35), transparent 35%),
    linear-gradient(180deg, #27143b, #ffb56f 28%, #ffe8c7 54%, #ffcc8b);
  color:var(--navy);
}
a, button { font:inherit; color:inherit; }
.app {
  width:min(480px, 100%);
  margin:0 auto;
  min-height:100svh;
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg, transparent 0, transparent 28%, var(--cream) 28%, #ffd39c 100%);
  box-shadow:0 0 60px rgba(0,0,0,.35);
}
.app::before, .app::after {
  content:"🌴";
  position:fixed;
  z-index:1;
  bottom:-28px;
  font-size:92px;
  opacity:.5;
  pointer-events:none;
}
.app::before { left:calc(50% - 250px); transform:rotate(12deg); }
.app::after { right:calc(50% - 250px); transform:scaleX(-1) rotate(12deg); }

.top-buttons {
  position:fixed;
  z-index:50;
  top:max(12px, env(safe-area-inset-top));
  left:50%;
  transform:translateX(-50%);
  width:min(450px, calc(100% - 22px));
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}
.floating {
  width:52px; height:52px; border-radius:50%;
  border:0;
  display:grid; place-items:center;
  color:white;
  background:linear-gradient(135deg, #ff8b00, #df2e83);
  box-shadow:0 10px 24px rgba(0,0,0,.38);
  text-decoration:none;
  font-size:26px;
  font-weight:950;
  pointer-events:auto;
}

.hero::after {
  content:"";
  position:absolute;
  inset:auto -20% -80px -20%;
  height:210px;
  background:linear-gradient(180deg, transparent, var(--cream) 60%);
  pointer-events:none;
}
.hero-inner { position:relative; z-index:2; width:100%; }
.logo-title {
  margin:0;
  font-weight:1000;
  text-transform:uppercase;
  letter-spacing:-5px;
  font-size:clamp(70px, 20vw, 106px);
  line-height:.76;
  transform:skew(-7deg);
  color:var(--orange);
  text-shadow:0 6px 19px rgba(0,0,0,.56);
}
.logo-title span {
  display:block;
  color:#081638;
  -webkit-text-stroke: 1px rgba(255,255,255,.62);
  text-shadow:0 5px 18px rgba(255,255,255,.34);
}
.place {
  margin-top:14px;
  font-weight:1000;
  font-size:17px;
  letter-spacing:.6px;
  text-shadow:0 4px 13px rgba(0,0,0,.82);
}
.handle {
  display:inline-flex;
  align-items:center;
  gap:7px;
  margin-top:10px;
  padding:8px 14px;
  color:white;
  text-decoration:none;
  border-radius:999px;
  font-weight:950;
  background:rgba(0,0,0,.23);
  border:1px solid rgba(255,255,255,.38);
  backdrop-filter:blur(7px);
}
.claim {
  margin:102px auto 0;
  display:inline-block;
  font-size:clamp(24px, 7vw, 36px);
  line-height:1.05;
  font-weight:900;
  font-style:italic;
  text-shadow:0 4px 17px rgba(0,0,0,.9);
  transform:rotate(-2deg);
}
.underline {
  display:block;
  height:7px;
  background:linear-gradient(90deg, transparent, var(--orange), var(--pink), transparent);
  border-radius:999px;
  margin-top:0;
}

.content { position:relative; z-index:3; padding:15px 15px 98px; }
.section-title {
  text-align:center;
  text-transform:uppercase;
  font-weight:1000;
  color:var(--navy);
  font-size:27px;
  letter-spacing:1.2px;
  margin:10px 0 14px;
}
.action-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:13px;
}
.tile {
  min-height:205px;
  border-radius:23px;
  padding:18px 14px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  color:white;
  text-decoration:none;
  box-shadow:0 13px 26px rgba(0,0,0,.24);
  border:1px solid rgba(255,255,255,.48);
  position:relative;
  overflow:hidden;
  transform:translateY(0);
  transition:.18s ease;
}
.tile:active { transform:scale(.97); }
.tile::before {
  content:"";
  position:absolute; inset:0;
  background:radial-gradient(circle at 20% 10%, rgba(255,255,255,.34), transparent 39%);
}
.tile > * { position:relative; z-index:2; }
.tile-icon { font-size:52px; line-height:1; }
.tile h2 { margin:8px 0 5px; font-size:27px; line-height:1; text-transform:uppercase; }
.tile p { margin:0; font-weight:650; font-size:14px; line-height:1.28; }
.go {
  align-self:center;
  width:42px; height:42px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  display:grid; place-items:center;
  font-size:28px;
  font-weight:600;
}
.orange { background:linear-gradient(145deg,#ff9e00,#c93b00); }
.redpink { background:linear-gradient(145deg,#ff7042,#c61f74); }
.purple { background:linear-gradient(145deg,#d9318a,#11153c); }
.dark { background:linear-gradient(145deg,#ff7c17,#06132a 62%); }

  box-shadow:0 14px 28px rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.52);
  display:flex;
  align-items:flex-end;
}
.golden h2 {
  margin:0 0 4px;
  color:#ff9a00;
  font-size:48px;
  font-weight:1000;
  line-height:.92;
  text-transform:uppercase;
  transform:skew(-7deg);
}
.golden p {
  margin:4px 0 14px;
  font-weight:850;
  font-size:17px;
  line-height:1.25;
}
.gold-list {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  margin:13px 0;
}
.gold-list div {
  text-align:center;
  border-radius:14px;
  padding:9px 4px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);
  font-size:11px;
  font-weight:950;
  text-transform:uppercase;
}
.time {
  display:block;
  width:max-content;
  max-width:100%;
  margin:0 auto;
  border-radius:999px;
  background:#ff9a00;
  color:#111;
  padding:9px 14px;
  font-weight:1000;
  text-transform:uppercase;
  font-size:13px;
  box-shadow:0 5px 0 rgba(0,0,0,.25);
}

.panel {
  margin-top:15px;
  background:rgba(255,246,231,.93);
  border-radius:25px;
  padding:17px 13px;
  box-shadow:0 12px 26px rgba(0,0,0,.12);
  border:1px solid rgba(255,255,255,.75);
}
.panel-head {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.panel h2 {
  margin:0;
  font-size:22px;
  line-height:1;
  text-transform:uppercase;
}
.panel .more {
  font-size:12px;
  font-weight:1000;
  color:#df2e83;

.poster-title{position:relative;z-index:2;text-align:center;padding:2px 8px 16px}.poster-title span{display:block;color:#ffb84a;font-size:12px;text-transform:uppercase;letter-spacing:3px;font-weight:1000;margin-bottom:8px}.poster-title h2{margin:0;color:white;font-size:clamp(34px,8vw,56px);line-height:.9;font-weight:1000;text-transform:uppercase;letter-spacing:-1px;text-shadow:0 4px 18px rgba(0,0,0,.45)}
.poster-divider{width:160px;margin:14px auto 0;color:#ffb84a;font-size:18px;display:flex;align-items:center;justify-content:center;gap:10px}.poster-divider::before,.poster-divider::after{content:"";height:2px;flex:1;background:linear-gradient(90deg,transparent,#ffb84a)}.poster-divider::after{background:linear-gradient(90deg,#ffb84a,transparent)}
.poster-list{position:relative;z-index:2;display:grid;border-radius:22px;overflow:hidden;border:1px solid rgba(255,184,74,.35);background:rgba(0,0,0,.14)}
.poster-row{display:grid;grid-template-columns:82px 50px minmax(0,1.15fr) minmax(0,.95fr);gap:12px;align-items:center;min-height:86px;padding:10px 12px;border-bottom:1px solid rgba(255,184,74,.28)}.poster-row:last-child{border-bottom:0}
.poster-date{height:70px;border-radius:10px;color:#071528;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#ffd66a,#f2a42d);box-shadow:inset 0 -4px 0 rgba(0,0,0,.08);position:relative;overflow:hidden}.poster-date span{font-size:11px;line-height:1;font-weight:1000;text-transform:uppercase}.poster-date strong{font-size:31px;line-height:.9;font-weight:1000}.poster-date em{font-style:normal;font-size:11px;font-weight:1000}
.poster-music-icon{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:30px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);filter:drop-shadow(0 4px 8px rgba(0,0,0,.25))}
.poster-band{min-width:0}.poster-band small{display:block;color:#ffb84a;font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}.poster-band h3{margin:0;color:white;font-size:clamp(20px,4.8vw,31px);line-height:1;font-weight:1000;text-transform:uppercase;letter-spacing:.3px;text-shadow:0 3px 10px rgba(0,0,0,.45)}
.poster-theme{display:grid;grid-template-columns:46px 1fr;gap:10px;align-items:center;padding-left:13px;border-left:1px solid rgba(255,255,255,.26);min-width:0}.poster-food-icon{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;font-size:28px;background:rgba(255,255,255,.08)}
.poster-theme strong{display:block;color:#ff4b3e;font-size:15px;line-height:1;font-weight:1000;text-transform:uppercase}.poster-theme span{display:block;margin-top:5px;color:white;font-size:13px;line-height:1.18;font-weight:650}.empty-theme strong{color:#ffb84a}.empty-theme span{color:rgba(255,255,255,.78)}
@media(max-width:620px){.poster-row{grid-template-columns:72px 42px 1fr;grid-template-areas:"date icon band" "date theme theme";gap:8px 10px;min-height:auto;padding:10px}.poster-date{grid-area:date;height:80px}.poster-music-icon{grid-area:icon;width:42px;height:42px;border-radius:13px;font-size:25px}.poster-band{grid-area:band}.poster-theme{grid-area:theme;border-left:0;padding-left:0;grid-template-columns:34px 1fr;gap:8px;padding-top:2px}.poster-food-icon{width:34px;height:34px;border-radius:12px;font-size:21px}.poster-theme strong{font-size:13px}.poster-theme span{font-size:12px}.poster-band h3{font-size:clamp(18px,5.3vw,24px)}}
</style>


<style>
.sb-menu{margin-top:18px;border-radius:30px;padding:18px 14px 16px;background:radial-gradient(circle at 0% 0%,rgba(255,139,0,.24),transparent 34%),radial-gradient(circle at 100% 0%,rgba(224,47,132,.18),transparent 36%),rgba(255,250,242,.96);border:1px solid rgba(255,255,255,.82);box-shadow:0 14px 32px rgba(0,0,0,.14);overflow:hidden}
.sb-menu-head{text-align:center;margin-bottom:14px}.sb-menu-head span{color:#e54822;font-size:12px;font-weight:1000;text-transform:uppercase;letter-spacing:1.2px}.sb-menu-head h2{margin:5px 0 6px;color:#071528;font-size:36px;line-height:.9;font-weight:1000;text-transform:uppercase}.sb-menu-head p{margin:0;color:#6b4b3a;font-size:13px;font-weight:750}
.sb-menu-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}.sb-menu-tab{border:0;border-radius:999px;padding:10px 8px;background:#fff0d8;color:#071528;font-weight:1000;font-family:inherit;box-shadow:inset 0 0 0 1px rgba(229,72,34,.12)}.sb-menu-tab.active{color:white;background:linear-gradient(135deg,#ff8b00,#e02f84);box-shadow:0 8px 18px rgba(0,0,0,.18)}
.sb-menu-panel{display:none}.sb-menu-panel.active{display:block;animation:menuFade .22s ease both}@keyframes menuFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sb-menu-card{min-height:150px;border-radius:24px;padding:18px;color:white;display:flex;align-items:flex-end;background:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.78)),radial-gradient(circle at 20% 12%,rgba(255,255,255,.24),transparent 34%),linear-gradient(135deg,#ff8b00,#e02f84);box-shadow:0 12px 28px rgba(0,0,0,.20);overflow:hidden}.sb-menu-card small{font-size:12px;font-weight:1000;text-transform:uppercase;letter-spacing:1px;color:#ffcf72}.sb-menu-card h3{margin:4px 0 0;font-size:26px;line-height:1;font-weight:1000;text-transform:uppercase}
.hero-food{background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.78)),radial-gradient(circle at 18% 12%,rgba(255,180,70,.35),transparent 30%),linear-gradient(135deg,#d84a16,#071528)}.hero-crostoni{background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.78)),radial-gradient(circle at 80% 16%,rgba(255,220,130,.35),transparent 32%),linear-gradient(135deg,#c77822,#8f1715)}
.sb-menu-list{display:grid;gap:10px;margin-top:12px}.sb-menu-group{padding:14px;border-radius:18px;background:rgba(255,255,255,.84);border:1px solid rgba(229,72,34,.10);box-shadow:0 7px 16px rgba(0,0,0,.06)}.sb-menu-group h4{margin:0 0 8px;color:#c52822;font-size:16px;font-weight:1000;text-transform:uppercase}.sb-menu-group p{margin:7px 0 0;color:#1f2937;font-size:14px;line-height:1.25;font-weight:760}
.sb-base{margin:12px 0;padding:15px;border-radius:18px;background:#071528;color:white;text-align:center}.sb-base strong{display:block;color:#ffb84a;text-transform:uppercase;font-weight:1000;margin-bottom:4px}.sb-base span{font-weight:800}.sb-chip-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}.sb-chip-grid span{padding:9px 12px;border-radius:999px;background:#fff0d8;color:#071528;font-size:13px;font-weight:900;box-shadow:inset 0 0 0 1px rgba(229,72,34,.12)}
@media(max-width:430px){.sb-menu{padding:16px 12px 14px}.sb-menu-head h2{font-size:32px}.sb-menu-tab{font-size:13px;padding:9px 6px}.sb-menu-card{min-height:132px}.sb-menu-card h3{font-size:22px}}
</style>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
